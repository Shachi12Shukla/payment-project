<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="navbar">
        <h2>PayWallet</h2>

        <button onclick="logout()">
            Logout
        </button>
    </div>

    <div class="container">

        <div class="card">
            <h3>Your Balance</h3>

            <div
                class="balance"
                id="balance"
            >
                ₹ 0
            </div>
        </div>

        <div class="card">
            <h3>Search Users</h3>

            <input
                type="text"
                id="search"
                placeholder="Enter name..."
            >
        </div>

        <div
            id="usersContainer"
        >
        </div>

    </div>

    <script src="js/config.js"></script>
    <script src="js/dashboard.js"></script>

</body>
</html>
